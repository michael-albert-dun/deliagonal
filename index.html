<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CandyClear</title>
  <link rel="stylesheet" href="styles.css">
  <script src="src/game.js" defer></script>
</head>

<body>
  <main class="app">
    <section class="play-area" aria-labelledby="title">
      <header class="top-bar">
        <h1 id="title">CandyClear</h1>
        <button id="info-button" class="icon-button info-button" type="button" aria-label="Information">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="12" cy="12" r="9" />
            <path d="M12 11v5" />
            <path d="M12 8h.01" />
          </svg>
        </button>
        <div id="info-panel" class="info-panel" hidden>
          <p>Select two candies of the same colour to clear the rectangle between them.</p>
          <p>Select the same candy twice to clear just that candy.</p>
        </div>
      </header>

      <div id="board" class="board" aria-label="CandyClear board"></div>

      <footer class="game-footer">
        <div class="footer-panel footer-panel-left">
          <button id="new-button" type="button">New</button>
        </div>
        <div class="footer-panel footer-panel-center">
          <p id="challenge" class="challenge" aria-live="polite">Clear in 3</p>
          <p id="score" class="score" aria-live="polite"></p>
        </div>
        <div class="footer-panel footer-panel-right">
          <button id="undo-button" class="icon-button" type="button" aria-label="Undo" disabled>
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M9 14 4 9l5-5" />
              <path d="M4 9h10a6 6 0 0 1 0 12h-3" />
            </svg>
          </button>
          <button id="settings-button" class="icon-button" type="button" aria-label="Settings">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 15.5a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7Z" />
              <path d="M19.4 15a1.7 1.7 0 0 0 .34 1.88l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06A1.7 1.7 0 0 0 15 19.4a1.7 1.7 0 0 0-1 1.55V21a2 2 0 1 1-4 0v-.09a1.7 1.7 0 0 0-1-1.55 1.7 1.7 0 0 0-1.88.34l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.7 1.7 0 0 0 4.6 15a1.7 1.7 0 0 0-1.55-1H3a2 2 0 1 1 0-4h.09a1.7 1.7 0 0 0 1.55-1 1.7 1.7 0 0 0-.34-1.88l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.7 1.7 0 0 0 9 4.6a1.7 1.7 0 0 0 1-1.55V3a2 2 0 1 1 4 0v.09a1.7 1.7 0 0 0 1 1.55 1.7 1.7 0 0 0 1.88-.34l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.7 1.7 0 0 0 19.4 9a1.7 1.7 0 0 0 1.55 1H21a2 2 0 1 1 0 4h-.09a1.7 1.7 0 0 0-1.55 1Z" />
            </svg>
          </button>
          <form id="settings-panel" class="settings-panel" hidden>
            <fieldset>
              <legend>Candies per colour</legend>
              <div class="segmented-control">
                <label>
                  <input type="radio" name="copies-per-color" value="2">
                  <span>2</span>
                </label>
                <label>
                  <input type="radio" name="copies-per-color" value="3">
                  <span>3</span>
                </label>
                <label>
                  <input type="radio" name="copies-per-color" value="4" checked>
                  <span>4</span>
                </label>
                <label>
                  <input type="radio" name="copies-per-color" value="5">
                  <span>5</span>
                </label>
                <label>
                  <input type="radio" name="copies-per-color" value="6">
                  <span>6</span>
                </label>
              </div>
            </fieldset>
          </form>
        </div>
      </footer>
    </section>
  </main>
</body>

</html>
