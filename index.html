  <h2 id="game-over"></h2>

  <div class="modal" id="info-modal">
    <div class="modal-header">
      <div class="title">Game Information</div>
      <button id="info-modal-close" class="close-button">&times;</button>
    </div>
    <div class="modal-body">
      <h2>Playing</h2>
      <ul>
        <li>
          Select one or two candies (of the same colour), then press "Enter" to clear the rectangular area they define.
        </li>
        <li>
          Cleared areas cannot contain solid blocks.
        </li>
      </ul>
      <h2>Keyboard shortcuts</h2>
      <table>
        <tr>
          <td>I</td>
          <td>Open this window</td>
        </tr>
        <tr>
          <td>Z</td>
          <td>Undo last move</td>
        </tr>
        <tr>
          <td>&#x232b;</td>
          <td>Unselect last selected candy</td>
        </tr>
      </table>
    </div>
  </div>

  <div id="overlay"></div>
